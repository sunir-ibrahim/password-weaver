kind = "web"
previewPath = "/"
title = "Smart Password Generator"
version = "1.0.0"
id = "artifacts/password-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25434
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/password-generator run dev"

[services.env]
PORT = "25434"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/password-generator", "run", "build"]
publicDir = "artifacts/password-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
